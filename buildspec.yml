version: 0.2
phases:
  install:
    commands:
      - echo install step...
  pre_build:
    commands:
      - echo logging in to AWS ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin <account-id>.dkr.ecr.us-east-1.amazonaws.com
  build:
    commands:
      - echo build Docker image on `date`
      - cd src
      - docker build -t myreactapp:v1 .
      - docker tag myreactapp:v1 962804699607.dkr.ecr.us-west-2.amazonaws.com/keshav-ecr-repository:latest
  post_build:
    commands:
      - echo build Docker image complete `date`
      - echo push latest Docker images to ECR...
      - docker push 962804699607.dkr.ecr.us-west-2.amazonaws.com/keshav-ecr-repository:latest
